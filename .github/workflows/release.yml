name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run parser tests
        run: node test_parsers.js

      - name: Syntax check
        run: node --check StorySync.jsx

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            StorySync.jsx
            examples/example_script.csv
            examples/example_script.txt
          generate_release_notes: true
          draft: false
          prerelease: false
